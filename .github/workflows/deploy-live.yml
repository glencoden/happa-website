name: deploy-live

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-live:
    runs-on: ubuntu-latest
    steps:
      - name: get latest code
        uses: actions/checkout@v4
      - name: install pnpm
        uses: pnpm/action-setup@v4
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: install dependencies
        run: pnpm install --frozen-lockfile
      - name: build app
        run: pnpm build
      - name: inspect ftp root
        run: |
          echo "--- root listing ---"
          curl -s --ssl-reqd --list-only -u "gsi_10556_1_happa-berlin.com:${{ secrets.FTP_PASSWORD }}" ftp://web15.greensta.de/ || true
          echo "--- sync state file (first 40 lines) ---"
          curl -s --ssl-reqd -u "gsi_10556_1_happa-berlin.com:${{ secrets.FTP_PASSWORD }}" ftp://web15.greensta.de/.ftp-deploy-sync-state.json | head -40 || true
          echo "--- attempt mkdir _astro ---"
          curl -s --ssl-reqd -u "gsi_10556_1_happa-berlin.com:${{ secrets.FTP_PASSWORD }}" -Q "MKD _astro" ftp://web15.greensta.de/ -v 2>&1 | grep -E "^(< |> )" || true
          echo "--- listing after mkdir attempt ---"
          curl -s --ssl-reqd --list-only -u "gsi_10556_1_happa-berlin.com:${{ secrets.FTP_PASSWORD }}" ftp://web15.greensta.de/ || true
      - name: sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          local-dir: ./dist/
          protocol: ftps
          server: web15.greensta.de
          username: gsi_10556_1_happa-berlin.com
          password: ${{ secrets.FTP_PASSWORD }}
